events {
  worker_connections 4096;
}

http {
  upstream backend {
    server backend:3000;
  }

  server {
    listen 80;
    listen [::]:80;

    location /socket.io/ {
      proxy_pass http://backend/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://backend/;
    }
  }

}
