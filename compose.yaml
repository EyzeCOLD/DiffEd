services:
  nginx:
    init: true
    image: nginx:1.29.5-alpine
    depends_on:
      - frontend
    ports:
      - 8080:8080
    volumes:
      - ./nginx/dev.nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped

  #  backend:
  #    init: true
  #    build:
  #      context: ./
  #      dockerfile: ./backend/Dockerfile
  #    volumes:
  #      - webfiles:/frontend
  #    restart: unless-stopped

  frontend:
    init: true
    build:
      context: ./
      dockerfile: ./frontend/Dockerfile
    volumes:
      - webfiles:/frontend

volumes:
  webfiles:
